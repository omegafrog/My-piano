services:
  mysql-mypiano:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mypiano
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=128M
      - --max-connections=40
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 320M

  elasticsearch:
    build:
      context: ./docker/elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 45
    deploy:
      resources:
        limits:
          memory: 448M

  elasticsearch-init:
    image: curlimages/curl:8.12.1
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        curl -fsS -X PUT http://elasticsearch:9200/_index_template/mypiano-aws-nori \
          -H 'Content-Type: application/json' \
          --data-binary '{"index_patterns":["sheetpost"],"template":{"settings":{"analysis":{"analyzer":{"my_nori_analyzer":{"type":"custom","tokenizer":"nori_tokenizer"}}}}}}'
    deploy:
      resources:
        limits:
          memory: 32M

  redis-mypiano-user:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_user_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 64M

  redis-mypiano-cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 48mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 64M

  app:
    build:
      context: .
      dockerfile: Dockerfile.aws
    restart: unless-stopped
    env_file:
      - .env.aws
    environment:
      SPRING_PROFILES_ACTIVE: local,local-seed
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "8"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SERVER_TOMCAT_THREADS_MAX: "30"
      ASYNC_POOL_CORE: "4"
      ASYNC_POOL_MAX: "8"
      ASYNC_QUEUE_CAPACITY: "500"
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -Xms128m -Xmx320m -XX:+UseSerialGC
    volumes:
      - local_storage:/workspace/local-storage
    depends_on:
      mysql-mypiano:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      elasticsearch-init:
        condition: service_completed_successfully
      redis-mypiano-user:
        condition: service_healthy
      redis-mypiano-cache:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthcheck >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 448M

volumes:
  mysql_data:
  elasticsearch_data:
  redis_user_data:
  redis_cache_data:
  local_storage:
