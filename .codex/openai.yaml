interface:
  display_name: "Orchestrate Plan"
  short_description: "Run harvest, design, docs, execution, and hook-driven verification"
  default_prompt: >
    Use $orchestrate-plan to route this request through
    use_case_harvester, oracle, doc_writer, executor, and closer.

    Verification and sync steps are hook-driven:
    - after doc_writer -> doc_verify (before execute)
    - after executor -> test_gate
    - after passing test_gate -> execute_writer
    - after execute_writer -> doc_verify (after execute)
    - before closer -> closer preflight hook

    Do not start oracle or any downstream step until the harvest document
    is ready and the user explicitly approved proceeding.
