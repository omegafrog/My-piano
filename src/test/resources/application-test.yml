spring:
  application:
    name: mypiano
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/mypianotest?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=10000
    username: root
    password: password
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        # generate_statistics: true
        # use_sql_comments: true
    hibernate:
      ddl-auto: create-drop
  cloud:
    aws:
      region:
        static: ap-northeast-2
      bucket:
        name: mypianobucket
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: http://localhost:8080/api/v1/oauth2/google/callback
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  redis:
    user:
      host: 127.0.0.1
      port: 16379
    cache:
      host: 127.0.0.1
      port: 6380
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  data:
    redis:
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: coupon-payment-result-consumer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.omegafrog.My.piano.app.web.event.payment

elasticsearch:
  host: localhost
  port: 9200

async:
  pool:
    core: 16
    max: 100
  queue:
    capacity: 20000

security:
  password:
    expire:
      period: 90L
firebase:
  app:
    admin:
      json: src/main/resources/firebase-admin.json

coupon:
  kafka:
    enabled: false
    payment-succeeded-topic: payment-succeeded
    payment-failed-topic: payment-failed

payment:
  toss:
    api-url: https://api.tosspayments.com/v1/payments

server:
  tomcat:
    threads:
      max: 200
local:
  storage:
    base-path: ./static

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches,prometheus
  metrics:
    tags:
      application: ${spring.application.name:mypiano}
