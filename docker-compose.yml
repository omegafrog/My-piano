services:
  mysql-mypiano:
    image: mysql:8.0
    container_name: mysql-mypiano
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=mypianotest
      - TZ=UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - db-net

  elasticsearch:
    build:
      context: ./docker/elasticsearch
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - elastic

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elastic

  redis-mypiano-user:
    image: redis:7-alpine
    container_name: redis-mypiano-user
    ports:
      - "16379:6379"
    volumes:
      - redis_user_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - redis-net

  redis-mypiano-cache:
    image: redis:7-alpine
    container_name: redis-mypiano-cache
    ports:
      - "6380:6379"
    volumes:
      - redis_cache_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - redis-net

  app-benchmark:
    profiles: ["benchmark"]
    image: gradle:8.10.2-jdk17
    container_name: app-benchmark
    user: gradle
    working_dir: /workspace
    command: ["bash", "-lc", "bash ./gradlew --no-daemon --project-cache-dir /workspace/.gradle-app-benchmark bootRun --args='--spring.profiles.active=dev,benchmark,benchmark-seed'"]
    environment:
      - GRADLE_USER_HOME=/home/gradle/.gradle-app-benchmark
    volumes:
      - .:/workspace
      - gradle_cache_benchmark:/home/gradle/.gradle-app-benchmark
    depends_on:
      mysql-mypiano:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis-mypiano-user:
        condition: service_healthy
      redis-mypiano-cache:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - db-net
      - elastic
      - redis-net

  app-benchmark-no-cache:
    profiles: ["benchmark"]
    image: gradle:8.10.2-jdk17
    container_name: app-benchmark-no-cache
    user: gradle
    working_dir: /workspace
    command: ["bash", "-lc", "bash ./gradlew --no-daemon --project-cache-dir /workspace/.gradle-app-benchmark-no-cache bootRun --args='--spring.profiles.active=dev,benchmark,benchmark-readonly,benchmark-no-cache'"]
    environment:
      - GRADLE_USER_HOME=/home/gradle/.gradle-app-benchmark-no-cache
    volumes:
      - .:/workspace
      - gradle_cache_benchmark_no_cache:/home/gradle/.gradle-app-benchmark-no-cache
    depends_on:
      mysql-mypiano:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis-mypiano-user:
        condition: service_healthy
      redis-mypiano-cache:
        condition: service_healthy
      app-benchmark:
        condition: service_started
    ports:
      - "8081:8080"
    networks:
      - db-net
      - elastic
      - redis-net

  k6:
    profiles: ["benchmark"]
    image: grafana/k6:0.51.0
    working_dir: /workspace
    volumes:
      - .:/workspace
    networks:
      - db-net
      - elastic
      - redis-net

volumes:
  mysql_data:
  elasticsearch_data:
  redis_user_data:
  redis_cache_data:
  gradle_cache_benchmark:
  gradle_cache_benchmark_no_cache:


networks:
  elastic:
    driver: bridge
  redis-net:
    driver: bridge
  db-net:
    driver: bridge
