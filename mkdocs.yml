site_name: My-Piano 위키
docs_dir: docs/wiki
site_dir: .harness/wiki-site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 어두운 테마로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 밝은 테마로 전환

plugins:
  - search

markdown_extensions:
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - 개요: index.md
  - 사용자 흐름: user-workflows.md
  - 도메인·아키텍처: domain-architecture.md
  - API: api.md
  - 운영: operations.md
  - 검증: verification.md
  - 변경 이력: change-history.md
